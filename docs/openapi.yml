      summary: 로그인
      deprecated: false
      description: ''
      tags:
        - 인증
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 이메일
                password:
                  type: string
                  description: 패스워드
              required:
                - email
                - password
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
                required:
                  - accessToken
                  - refreshToken
                  - expiresIn
              examples:
                '1':
                  summary: Success
                  value:
                    accessToken: >-
                      eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpYXQiOjE3Mzk5MjcyOTEsImV4cCI6MTc0MDAxMzY5MSwic3ViIjoiMSJ9.QlY-8RfkvLHwDgKWmVoxtNeyy6TyntyX4dm_a_urRzE
                    refreshToken: 5116973f-6464-4af8-817b-2876b999b3ec
                    expiresIn: 1740013691
