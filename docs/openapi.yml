        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  nickname:
                    type: string
                  bio:
                    type: string
                  email:
                    type: string
                  imageUrl:
                    type: string
                  createdAt:
                    type: string
                  updatedAt:
                    type: string
                required:
