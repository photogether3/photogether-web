      deprecated: false
      description: ''
      tags:
        - 사진첩
      parameters:
        - name: page
          in: query
          description: 페이지 번호
          required: false
          example: 1
          schema:
            type: integer
        - name: perPage
          in: query
          description: 한 페이지에 불러올 아이템 개수
          required: false
          example: 10
          schema:
            type: integer
        - name: sortOrder
          in: query
          description: 정렬방식
          required: false
          example: asc | desc
          schema:
            type: string
        - name: sortBy
          in: query
          description: 정렬대상
          required: false
          example: title | created_at
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  perPage:
                    type: integer
                  totalItemCount:
                    type: integer
                  totalPageCount:
                    type: integer
                  currentPage:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        type:
                          type: string
                        category:
                          type:
                            - object
                            - 'null'
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            createdAt:
                              type: string
                            updatedAt:
                              type: string
                          required:
                            - id
                            - name
                            - createdAt
                            - updatedAt
                        postCount:
                          type: integer
                        imageUrls:
                          type: array
                          items:
                            type: string
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
                        userId:
                          type: integer
                        categoryId:
                          type:
                            - integer
                            - 'null'
                      required:
                        - id
                        - title
                        - type
                        - category
                        - postCount
                        - imageUrls
                        - createdAt
                        - updatedAt
                        - userId
                        - categoryId
                required:
                  - perPage
                  - totalItemCount
                  - totalPageCount
                  - currentPage
                  - items
              examples:
                '1':
                  summary: Success
                  value:
                    perPage: 10
                    totalItemCount: 3
                    totalPageCount: 1
                    currentPage: 1
                    items:
                      - id: 3
                        title: when entice cleave bitterly birdbath phew
                        type: DEFAULT
                        category:
                          id: 1001
                          name: 기술
                        postCount: 0
                        imageUrls: []
                        createdAt: '2025-02-19T06:06:06.043+00:00'
                        updatedAt: '2025-02-19T06:10:45.535+00:00'
                      - id: 2
                        title: 휴지통
                        type: TRASH
                        category: null
                        postCount: 3
