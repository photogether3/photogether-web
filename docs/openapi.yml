        고려해야할 상황)
        - 카테고리를 사용하는 사진첩이 존재하면 해당 카테고리는 삭제 할 수 없습니다.
        ex) 사진첩1이 '운동' 이라는 카테고리를 사용중이면 '운동' 카테고리를 삭제할 수 없습니다.
